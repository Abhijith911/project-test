<!DOCTYPE html>
<html>
<head>
    <title>ParkSmart Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background-color: #f4f6f9;
        }

        /* ADD THIS BLOCK */
        .summary-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .summary-card {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            background: white;
            border-left: 6px solid #0d6efd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .summary-card.available {
            border-left-color: #198754;
        }

        .summary-card.occupied {
            border-left-color: #dc3545;
        }

        .summary-card.rate {
            border-left-color: #ffc107;
        }

        .summary-card h3 {
            font-size: 16px;
            margin: 0;
            color: #666;
        }

        .summary-card h1 {
            margin: 5px 0 0 0;
        }
        /* END ADD */

        .parking-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .slot-card {
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            border: 3px solid;
            background-color: white;
        }

        .slot-id {
            font-size: 22px;
            margin-top: 10px;
        }

        .slot-status {
            font-size: 14px;
            margin-top: 5px;
        }

        .slot-plate {
            font-size: 12px;
            margin-top: 8px;
            color: #555;
        }

        .free {
            border-color: #198754;
            background-color: #e9f7ef;
            color: #198754;
        }

        .pending {
            border-color: #ffc107;
            background-color: #fff8e1;
            color: #b58900;
        }

        .occupied {
            border-color: #dc3545;
            background-color: #fdecea;
            color: #dc3545;
        }

        .maintenance {
            border-color: #6c757d;
            background-color: #e9ecef;
            color: #6c757d;
        }

        .icon {
            font-size: 28px;
        }

    </style>

</head>
<body>

<div class="container mt-4">

    <h2>Parking Layout</h2>

    <div class="summary-container">

        <div class="summary-card">
            <h3>Total Spots</h3>
            <h1>{{ total }}</h1>
        </div>

        <div class="summary-card available">
            <h3>Available</h3>
            <h1>{{ free }}</h1>
        </div>

        <div class="summary-card occupied">
            <h3>Occupied</h3>
            <h1>{{ occupied }}</h1>
        </div>

        <div class="summary-card rate">
            <h3>Occupancy</h3>
            <h1>{{ occupancy_rate }}%</h1>
        </div>

    </div>

    <div class="parking-grid">

        {% for slot in slots %}

        <div class="slot-card {{ slot.status }}">

            <div class="icon">🚗</div>

            <div class="slot-id">
                {{ slot.slot_id }}
            </div>

            <div class="slot-status">
                {{ slot.status | capitalize }}
            </div>

            <div class="slot-plate">
                {{ slot.plate if slot.plate else "" }}
            </div>

        </div>

        {% endfor %}

    </div>

</div>

<script>
    setInterval(function() {
        window.location.reload();
    }, 2000);
</script>

</body>
</html>
